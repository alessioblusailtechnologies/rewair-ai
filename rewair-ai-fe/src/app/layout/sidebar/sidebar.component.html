<aside class="sidebar">
  <div class="sidebar-header">
    <img src="logo-rewair.png" alt="ReWAir" class="logo-img" />
  </div>

  <nav class="sidebar-nav">
    @for (item of navItems; track item.route) {
      <a [routerLink]="item.route" routerLinkActive="active" class="nav-item">
        <hugeicons-icon [strokeWidth]="1.5" [icon]="item.icon" [size]="20" color="currentColor" />
        <span>{{ item.label }}</span>
        @if (item.route === '/orders' && polling.hasUnseen) {
          <span class="nav-badge"></span>
        }
      </a>
    }
  </nav>

  <div class="sidebar-secondary">
    @for (item of secondaryItems; track item.route) {
      <a [routerLink]="item.route" routerLinkActive="active" class="nav-item">
        <hugeicons-icon [strokeWidth]="1.5" [icon]="item.icon" [size]="20" color="currentColor" />
        <span>{{ item.label }}</span>
      </a>
    }
  </div>

  <div class="sidebar-footer">
    <div class="user-avatar">AD</div>
  </div>
</aside>
