@if (dropdownOpen) {
  <div class="backdrop" (click)="closeDropdown()"></div>
}

<header class="topbar">
  <div class="topbar-left">
    <span class="topbar-brand">ReWAir</span>
    <span class="topbar-sep">/</span>
    <div class="topbar-sede" [class.open]="dropdownOpen">
      <button class="sede-btn" (click)="toggleDropdown()">
        <hugeicons-icon [strokeWidth]="1.5" [icon]="LocationIcon" [size]="14" color="var(--rw-orange)" />
        <span>Sede di {{ currentSede.name }}</span>
        <hugeicons-icon [strokeWidth]="1.5" [icon]="ArrowDownIcon" [size]="12" color="var(--N200)" class="sede-arrow" />
      </button>
      @if (dropdownOpen) {
        <div class="sede-dropdown">
          @for (sede of sedi; track sede.name) {
            <a class="sede-option" [class.active]="sede.name === currentSede.name"
               (click)="selectSede(sede)">
              <span class="sede-check">
                @if (sede.name === currentSede.name) {
                  <hugeicons-icon [strokeWidth]="1.5" [icon]="CheckIcon" [size]="14" color="var(--rw-blue)" />
                }
              </span>
              <div>
                <strong>Sede di {{ sede.name }}</strong>
                <small>{{ sede.country }} — {{ sede.label }}</small>
              </div>
            </a>
          }
        </div>
      }
    </div>
  </div>
  <div class="topbar-right">
    <span class="topbar-datetime">{{ dateTime }}</span>
  </div>
</header>
